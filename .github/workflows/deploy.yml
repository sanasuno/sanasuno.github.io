name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main  # mainブランチにプッシュしたときに実行

permissions:
  contents: write  # GitHub Pagesにデプロイするための権限

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 依存関係のインストール
        run: npm install

      - name: Docusaurus のビルド
        run: npm run build

      - name: GitHub Pages へデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main  # mainブランチのみにデプロイ
          force_orphan: false  # gh-pagesブランチを作成しない
