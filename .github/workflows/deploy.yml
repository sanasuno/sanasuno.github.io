name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main  # メインブランチに push されたら実行

permissions:
  contents: write  # gh-pages ブランチに書き込むための権限

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn'  # または 'npm' を指定可能

      - name: Install dependencies
        run: yarn install  # npm を使う場合は `npm install`

      - name: Build Docusaurus
        run: yarn build  # npm を使う場合は `npm run build`

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
